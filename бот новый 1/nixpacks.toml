[phases.setup]
# Keep default Python detection, but ensure build tools exist if any dependency needs compilation.
nixPkgs = ["python311", "gcc", "pkg-config"]

[phases.install]
cmds = [
  "python -m venv /app/.venv",
  "/app/.venv/bin/python -m pip install --upgrade pip setuptools wheel",
  "/app/.venv/bin/pip install -vvv --no-cache-dir -r requirements.txt"
]

[start]
cmd = "python -u bot.py"

